services:
  - type: web
    name: ai-meeting-notes-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "https://ai-meeting-notes-manager.vercel.app,http://localhost:5173"
      - key: DATABASE_URL
        value: sqlite:///./meeting_notes.db
